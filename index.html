<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>build in progress | majasfr.pl</title>

<style>
*{box-sizing:border-box;margin:0}
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#dbeafe,#93c5fd,#60a5fa,#2563eb);
background-size:400% 400%;
animation:bg 18s ease infinite;
font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.term{
width:min(520px,90%);
background:#0f172acc;
color:#e5e7eb;
padding:28px 30px;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,.35);
backdrop-filter:blur(6px);
}

.line{margin:6px 0}

.prompt{color:#93c5fd}

.todo{color:#9ca3af}

.typing{
border-right:2px solid #e5e7eb;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 3s steps(26,end) forwards,blink .8s infinite;
}

@keyframes typing{
to{width:26ch}
}

@keyframes blink{
50%{border-color:transparent}
}

.footer{
margin-top:14px;
color:#6b7280;
font-size:.8rem;
}
</style>

<div class="term">
<div class="line"><span class="prompt">$</span> <span class="typing">building site...</span></div>
<div class="line"><span class="prompt">$</span> status: in progress</div>
<div class="line todo">// about</div>
<div class="line todo">// tools</div>
<div class="line todo">// demos</div>
<div class="footer">majasfr.pl 2026</div>
</div>

</html>
